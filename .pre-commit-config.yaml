exclude: ^\.claude/

repos:
  - repo: https://github.com/psf/black
    rev: 26.5.1
    hooks:
      - id: black
        language_version: python3.12

  - repo: https://github.com/pycqa/isort
    rev: 6.0.1
    hooks:
      - id: isort

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.21
    hooks:
      - id: ruff
        args: [--fix]
        files: ^src/

  - repo: local
    hooks:
      - id: mypy
        name: mypy (src/ completo)
        entry: uv run mypy
        language: system
        types: [python]
        files: ^src/
        pass_filenames: false
        args: ["src/"]

      - id: codeguard
        name: CodeGuard
        entry: uv run codeguard
        language: system
        types: [python]
        pass_filenames: false
        args: ["src/"]
